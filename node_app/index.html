<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Node.js Static Server</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 100px; background: #eef2f3; }
        .card { background: white; padding: 40px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2ecc71; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome!</h1>
        <p>This static HTML page is being served by a native Node.js HTTP server.</p>
        <p>Every request you make is being logged to <code>requests.log</code>.</p>
    </div>
</body>
</html>
